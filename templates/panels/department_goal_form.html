<!-- Department goal creation panel (loaded into #panel-body via openPanelFromUrl) -->
<div class="panel-form">
    <form hx-post="/priorities/goals"
          hx-swap="none"
          hx-on::after-request="if(event.detail.successful){ closePanel(); window.location.href='/priorities'; }">
        <input type="hidden" name="phase_id" value="{{ phase.id }}">
        <div class="form-group">
            <label class="form-label">Goal Title</label>
            <input type="text" name="title" class="form-input" required placeholder="e.g., Improve platform reliability to 99.9% uptime" autofocus>
        </div>
        <div class="form-group">
            <label class="form-label">Description</label>
            <textarea name="description" class="form-textarea" rows="3" placeholder="Optional details about the department goal"></textarea>
        </div>
        <div class="form-group">
            <label class="form-label">Status</label>
            <select name="status" class="form-select">
                <option value="not_started" selected>Not Started</option>
                <option value="in_progress">In Progress</option>
                <option value="on_hold">On Hold</option>
                <option value="completed">Completed</option>
            </select>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Create Department Goal</button>
            <button type="button" class="btn btn-secondary" onclick="closePanel()">Cancel</button>
        </div>
    </form>
</div>
