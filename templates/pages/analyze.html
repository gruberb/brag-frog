{% extends "base.html" %}

{% block title %}Logbook — Brag Frog{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Logbook</h1>
    <p class="page-subtitle">{{ phase.name }} &mdash; <span id="filtered-count">{{ filtered_count }}</span> of {{ total_entries }} entries <button type="button" class="bulk-edit-toggle-btn" id="bulk-edit-toggle" onclick="toggleBulkEdit()">Bulk Edit</button></p>
</div>

<div class="analyze-layout">
    <!-- Compact filter toolbar -->
    <div class="analyze-toolbar">
        <div class="analyze-toolbar-row">
            <input type="text"
                   id="filter-search"
                   class="form-input analyze-search-input"
                   placeholder="Search entries..."
                   value="{{ init_search }}"
                   oninput="debounceApply()">

            <select id="filter-dept-goal" class="form-select analyze-toolbar-select" onchange="onDeptGoalChange()">
                <option value="">All Dept Goals</option>
                {% for dg in dept_goals %}
                <option value="{{ dg.id }}" {% if init_department_goal_id == dg.id ~ "" %}selected{% endif %}>{{ dg.title }}</option>
                {% endfor %}
            </select>

            <select id="filter-priority" class="form-select analyze-toolbar-select" onchange="applyFilters()">
                <option value="">All Priorities</option>
                {% for p in priorities %}
                <option value="{{ p.id }}" data-dept-goal-id="{{ p.department_goal_id | default(value='') }}" {% if init_priority_id == p.id ~ "" %}selected{% endif %}>{{ p.title }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="analyze-more-panel open" id="more-panel">
            <div class="analyze-more-grid">
                <div class="analyze-more-field">
                    <label class="form-label form-label--inline">Source</label>
                    <select id="filter-source" class="form-select analyze-toolbar-select" onchange="applyFilters()">
                        <option value="">All Sources</option>
                        <option value="github" {% if init_source == "github" %}selected{% endif %}>GitHub</option>
                        <option value="phabricator" {% if init_source == "phabricator" %}selected{% endif %}>Phabricator</option>
                        <option value="bugzilla" {% if init_source == "bugzilla" %}selected{% endif %}>Bugzilla</option>
                        <option value="jira" {% if init_source == "jira" %}selected{% endif %}>Jira</option>
                        <option value="confluence" {% if init_source == "confluence" %}selected{% endif %}>Confluence</option>
                        <option value="google_drive" {% if init_source == "google_drive" %}selected{% endif %}>Google Drive</option>
                        <option value="google_calendar" {% if init_source == "google_calendar" %}selected{% endif %}>Google Calendar</option>
                        <option value="manual" {% if init_source == "manual" %}selected{% endif %}>Manual</option>
                    </select>
                </div>
                <div class="analyze-more-field">
                    <label class="form-label form-label--inline">Team</label>
                    <select id="filter-team" class="form-select analyze-toolbar-select" onchange="applyFilters()">
                        <option value="">All Teams</option>
                        {% for team in all_teams %}
                        <option value="{{ team }}" {% if init_team == team %}selected{% endif %}>{{ team }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="analyze-more-field">
                    <label class="form-label form-label--inline">Person</label>
                    <select id="filter-collaborator" class="form-select analyze-toolbar-select" onchange="applyFilters()">
                        <option value="">All People</option>
                        {% for collab in all_collaborators %}
                        <option value="{{ collab }}" {% if init_collaborator == collab %}selected{% endif %}>{{ collab }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="analyze-more-field">
                    <label class="form-label form-label--inline">Type</label>
                    <select id="filter-category" class="form-select analyze-toolbar-select" onchange="applyFilters()">
                        <option value="">All Types</option>
                        <option value="reviews" {% if init_category == "reviews" %}selected{% endif %}>Reviews</option>
                        <option value="code" {% if init_category == "code" %}selected{% endif %}>Code</option>
                        <option value="docs" {% if init_category == "docs" %}selected{% endif %}>Docs</option>
                        <option value="meetings" {% if init_category == "meetings" %}selected{% endif %}>Meetings</option>
                        <option value="collaboration" {% if init_category == "collaboration" %}selected{% endif %}>Collaboration</option>
                        <option value="learning" {% if init_category == "learning" %}selected{% endif %}>Learning</option>
                    </select>
                </div>
                <div class="analyze-more-field">
                    <label class="form-label form-label--inline">Reach</label>
                    <select id="filter-reach" class="form-select analyze-toolbar-select" onchange="applyFilters()">
                        <option value="">All Reach</option>
                        <option value="individual" {% if init_reach == "individual" %}selected{% endif %}>Individual</option>
                        <option value="team" {% if init_reach == "team" %}selected{% endif %}>Team</option>
                        <option value="org" {% if init_reach == "org" %}selected{% endif %}>Org</option>
                        <option value="company" {% if init_reach == "company" %}selected{% endif %}>Company</option>
                    </select>
                </div>
                <div class="analyze-more-field">
                    <label class="form-label form-label--inline">Complexity</label>
                    <select id="filter-complexity" class="form-select analyze-toolbar-select" onchange="applyFilters()">
                        <option value="">All Complexity</option>
                        <option value="low" {% if init_complexity == "low" %}selected{% endif %}>Low</option>
                        <option value="medium" {% if init_complexity == "medium" %}selected{% endif %}>Medium</option>
                        <option value="high" {% if init_complexity == "high" %}selected{% endif %}>High</option>
                    </select>
                </div>
                <div class="analyze-more-field">
                    <label class="form-label form-label--inline">Role</label>
                    <select id="filter-role" class="form-select analyze-toolbar-select" onchange="applyFilters()">
                        <option value="">All Roles</option>
                        <option value="driver" {% if init_role == "driver" %}selected{% endif %}>Driver</option>
                        <option value="contributor" {% if init_role == "contributor" %}selected{% endif %}>Contributor</option>
                        <option value="reviewer" {% if init_role == "reviewer" %}selected{% endif %}>Reviewer</option>
                        <option value="consulted" {% if init_role == "consulted" %}selected{% endif %}>Consulted</option>
                    </select>
                </div>
                <div class="analyze-more-field">
                    <label class="form-label form-label--inline">Show only</label>
                    <select id="filter-show-only" class="form-select analyze-toolbar-select" onchange="applyFilters()">
                        <option value="">All entries</option>
                        <option value="no_priority" {% if init_no_priority == "1" %}selected{% endif %}>Unlinked</option>
                        <option value="no_team" {% if init_no_team == "1" %}selected{% endif %}>Missing team</option>
                        <option value="no_collaborator" {% if init_no_collaborator == "1" %}selected{% endif %}>Missing collaborator</option>
                    </select>
                </div>
            </div>
        </div>
    </div>

    <!-- Active filter pills + clear button -->
    <div class="filter-pills-row" id="filter-pills-row" style="display:none">
        <button type="button" class="btn btn-sm btn-secondary" id="clear-all-btn" onclick="clearFilters()">Clear all</button>
        <div class="filter-pills" id="filter-pills"></div>
    </div>

    <!-- Results (date-grouped entries) -->
    <div id="analyze-results">
        {% include "components/analyze_results.html" %}
    </div>
</div>

<script>
var _bulkEditActive = false;
var _bulkMergeMode = 'append';

function toggleBulkEdit() {
    _bulkEditActive = !_bulkEditActive;
    var toggle = document.getElementById('bulk-edit-toggle');
    var toolbar = document.getElementById('bulk-edit-toolbar');
    toggle.classList.toggle('active', _bulkEditActive);
    toolbar.style.display = _bulkEditActive ? '' : 'none';
    document.body.classList.toggle('bulk-edit-active', _bulkEditActive);
    document.querySelectorAll('.bulk-edit-checkbox').forEach(function(cb) {
        cb.style.display = _bulkEditActive ? '' : 'none';
        if (!_bulkEditActive) cb.checked = false;
    });
    if (!_bulkEditActive) resetBulkFields();
    updateBulkCount();
}

function updateBulkCount() {
    var checked = document.querySelectorAll('.bulk-edit-checkbox:checked').length;
    var el = document.getElementById('bulk-edit-count');
    if (el) el.textContent = checked + ' selected';
}

function bulkSelectAll() {
    document.querySelectorAll('.bulk-edit-checkbox').forEach(function(cb) {
        if (cb.style.display !== 'none') cb.checked = true;
    });
    updateBulkCount();
}

function bulkDeselectAll() {
    document.querySelectorAll('.bulk-edit-checkbox').forEach(function(cb) {
        cb.checked = false;
    });
    updateBulkCount();
}

function setBulkMergeMode(mode) {
    _bulkMergeMode = mode;
    document.getElementById('bulk-merge-append').classList.toggle('active', mode === 'append');
    document.getElementById('bulk-merge-replace').classList.toggle('active', mode === 'replace');
}

function resetBulkFields() {
    document.getElementById('bulk-priority').value = '';
    document.getElementById('bulk-reach').value = '';
    document.getElementById('bulk-complexity').value = '';
    document.getElementById('bulk-role').value = '';
    document.getElementById('bulk-teams').value = '';
    document.getElementById('bulk-collaborators').value = '';
    setBulkMergeMode('append');
}

function bulkApply() {
    var ids = [];
    document.querySelectorAll('.bulk-edit-checkbox:checked').forEach(function(cb) {
        ids.push(cb.value);
    });
    if (ids.length === 0) return;

    var body = new URLSearchParams();
    body.set('entry_ids', ids.join(','));

    var priority = document.getElementById('bulk-priority').value;
    var reach = document.getElementById('bulk-reach').value;
    var complexity = document.getElementById('bulk-complexity').value;
    var role = document.getElementById('bulk-role').value;
    var teams = document.getElementById('bulk-teams').value.trim();
    var collaborators = document.getElementById('bulk-collaborators').value.trim();

    if (priority) body.set('priority_id', priority);
    if (reach) body.set('reach', reach);
    if (complexity) body.set('complexity', complexity);
    if (role) body.set('role', role);
    if (teams) body.set('teams', teams);
    if (collaborators) body.set('collaborators', collaborators);
    body.set('merge_mode', _bulkMergeMode);

    htmx.ajax('POST', '/entries/bulk-update', {
        target: '#analyze-results',
        swap: 'beforeend',
        values: Object.fromEntries(body)
    });
}

// After bulk update completes, refresh entries and reset
document.body.addEventListener('bulk-update-done', function() {
    applyFilters();
    resetBulkFields();
    bulkDeselectAll();
});

// After HTMX swaps entry list, re-show checkboxes if bulk mode is active
document.body.addEventListener('htmx:afterSwap', function(evt) {
    if (_bulkEditActive && evt.detail.target && evt.detail.target.id === 'analyze-results') {
        document.querySelectorAll('.bulk-edit-checkbox').forEach(function(cb) {
            cb.style.display = '';
        });
    }
});

var _debounceTimer = null;
function debounceApply() {
    clearTimeout(_debounceTimer);
    _debounceTimer = setTimeout(applyFilters, 300);
}

function onDeptGoalChange() {
    document.getElementById('filter-priority').value = '';
    filterPrioritesByDeptGoal(document.getElementById('filter-dept-goal').value);
    applyFilters();
}

function filterPrioritesByDeptGoal(deptGoalId) {
    var select = document.getElementById('filter-priority');
    var options = select.querySelectorAll('option[data-dept-goal-id]');
    options.forEach(function(opt) {
        if (!deptGoalId || opt.dataset.deptGoalId === deptGoalId) {
            opt.style.display = '';
            opt.disabled = false;
        } else {
            opt.style.display = 'none';
            opt.disabled = true;
            if (opt.selected) select.value = '';
        }
    });
}

function applyFilters() {
    var params = new URLSearchParams();
    var deptGoal = document.getElementById('filter-dept-goal').value;
    var priority = document.getElementById('filter-priority').value;
    var category = document.getElementById('filter-category').value;
    var source = document.getElementById('filter-source').value;
    var team = document.getElementById('filter-team').value;
    var collab = document.getElementById('filter-collaborator').value;
    var search = document.getElementById('filter-search').value.trim();
    var showOnly = document.getElementById('filter-show-only');
    var showOnlyVal = showOnly ? showOnly.value : '';
    var reach = document.getElementById('filter-reach').value;
    var complexity = document.getElementById('filter-complexity').value;
    var role = document.getElementById('filter-role').value;

    if (deptGoal) params.set('department_goal_id', deptGoal);
    if (priority) params.set('priority_id', priority);
    if (category) params.set('category', category);
    if (source) params.set('source', source);
    if (team) params.set('team', team);
    if (collab) params.set('collaborator', collab);
    if (search) params.set('search', search);
    if (showOnlyVal) params.set(showOnlyVal, '1');
    if (reach) params.set('reach', reach);
    if (complexity) params.set('complexity', complexity);
    if (role) params.set('role', role);

    htmx.ajax('GET', '/logbook/entries?' + params.toString(), {target: '#analyze-results', swap: 'innerHTML'});

    // Sync URL for bookmarkability
    var url = '/logbook';
    var qs = params.toString();
    if (qs) url += '?' + qs;
    history.replaceState(null, '', url);

    updateFilterPills(params);
    updateClearButton(params);

}

function clearFilters() {
    document.getElementById('filter-dept-goal').value = '';
    document.getElementById('filter-priority').value = '';
    document.getElementById('filter-category').value = '';
    document.getElementById('filter-source').value = '';
    document.getElementById('filter-team').value = '';
    document.getElementById('filter-collaborator').value = '';
    document.getElementById('filter-search').value = '';
    document.getElementById('filter-reach').value = '';
    document.getElementById('filter-complexity').value = '';
    document.getElementById('filter-role').value = '';
    var showOnly = document.getElementById('filter-show-only');
    if (showOnly) showOnly.value = '';
    filterPrioritesByDeptGoal('');
    applyFilters();
}

function removeFilter(field) {
    if (field === 'department_goal_id') { document.getElementById('filter-dept-goal').value = ''; document.getElementById('filter-priority').value = ''; filterPrioritesByDeptGoal(''); }
    else if (field === 'priority_id') document.getElementById('filter-priority').value = '';
    else if (field === 'category') document.getElementById('filter-category').value = '';
    else if (field === 'source') document.getElementById('filter-source').value = '';
    else if (field === 'team') document.getElementById('filter-team').value = '';
    else if (field === 'collaborator') document.getElementById('filter-collaborator').value = '';
    else if (field === 'search') document.getElementById('filter-search').value = '';
    else if (field === 'reach') document.getElementById('filter-reach').value = '';
    else if (field === 'complexity') document.getElementById('filter-complexity').value = '';
    else if (field === 'role') document.getElementById('filter-role').value = '';
    else if (field === 'no_priority' || field === 'no_team' || field === 'no_collaborator') {
        var showOnly = document.getElementById('filter-show-only');
        if (showOnly) showOnly.value = '';
    }
    applyFilters();
}

var PILL_LABELS = {
    department_goal_id: 'Dept Goal',
    priority_id: 'Priority',
    category: 'Type',
    source: 'Source',
    team: 'Team',
    collaborator: 'Person',
    search: 'Search',
    reach: 'Reach',
    complexity: 'Complexity',
    role: 'Role',
    no_priority: 'Unlinked',
    no_team: 'Missing team',
    no_collaborator: 'Missing collaborator'
};

function updateFilterPills(params) {
    var container = document.getElementById('filter-pills');
    var html = '';
    params.forEach(function(value, key) {
        var label = PILL_LABELS[key] || key;
        var displayValue = value;
        if (key === 'department_goal_id') {
            var opt = document.querySelector('#filter-dept-goal option[value="' + value + '"]');
            if (opt) displayValue = opt.textContent;
        } else if (key === 'priority_id') {
            var opt = document.querySelector('#filter-priority option[value="' + value + '"]');
            if (opt) displayValue = opt.textContent;
        } else if (key === 'no_priority' || key === 'no_team' || key === 'no_collaborator') {
            displayValue = '';
        }
        html += '<span class="filter-pill">' + label + (displayValue ? ': ' + displayValue : '') +
                ' <button class="filter-pill-remove" onclick="removeFilter(\'' + key + '\')">&times;</button></span>';
    });
    container.innerHTML = html;
}

function updateClearButton(params) {
    var row = document.getElementById('filter-pills-row');
    row.style.display = params.toString() ? '' : 'none';
}

// On page load: apply initial dept goal filter to cascade priority dropdown
(function() {
    var initDeptGoal = '{{ init_department_goal_id }}';
    if (initDeptGoal) filterPrioritesByDeptGoal(initDeptGoal);

    // Show clear button if any filters are active
    var params = new URLSearchParams(window.location.search);
    updateFilterPills(params);
    updateClearButton(params);

})();
</script>
{% endblock %}

{% block overlay %}
<div class="bulk-edit-toolbar" id="bulk-edit-toolbar" style="display:none">
    <div class="bulk-edit-toolbar-inner">
        <div class="bulk-edit-controls">
            <span class="bulk-edit-count" id="bulk-edit-count">0 selected</span>
            <button type="button" class="btn btn-sm btn-secondary" onclick="bulkSelectAll()">Select All</button>
            <button type="button" class="btn btn-sm btn-secondary" onclick="bulkDeselectAll()">Deselect All</button>
            <div class="bulk-edit-merge-toggle">
                <button type="button" class="bulk-merge-btn active" id="bulk-merge-append" onclick="setBulkMergeMode('append')">Append</button>
                <button type="button" class="bulk-merge-btn" id="bulk-merge-replace" onclick="setBulkMergeMode('replace')">Replace</button>
            </div>
            <button type="button" class="btn btn-sm btn-primary" onclick="bulkApply()">Apply</button>
            <button type="button" class="btn btn-sm btn-text" onclick="toggleBulkEdit()">Cancel</button>
        </div>
        <div class="bulk-edit-fields">
            <select id="bulk-priority" class="form-select form-select--sm">
                <option value="">Priority</option>
                {% for p in priorities %}
                <option value="{{ p.id }}">{{ p.title }}</option>
                {% endfor %}
            </select>
            <select id="bulk-reach" class="form-select form-select--sm">
                <option value="">Reach</option>
                <option value="team">Team</option>
                <option value="cross_team">Cross-team</option>
                <option value="org">Org</option>
                <option value="company">Company</option>
            </select>
            <select id="bulk-complexity" class="form-select form-select--sm">
                <option value="">Complexity</option>
                <option value="routine">Routine</option>
                <option value="moderate">Moderate</option>
                <option value="complex">Complex</option>
                <option value="novel">Novel</option>
            </select>
            <select id="bulk-role" class="form-select form-select--sm">
                <option value="">Role</option>
                <option value="contributor">Contributor</option>
                <option value="owner">Owner</option>
                <option value="lead">Lead</option>
                <option value="architect">Architect</option>
            </select>
            <input type="text" id="bulk-teams" class="form-input form-input--sm" placeholder="Teams" style="width:120px">
            <input type="text" id="bulk-collaborators" class="form-input form-input--sm" placeholder="Collaborators" style="width:120px">
        </div>
    </div>
</div>
{% endblock %}
