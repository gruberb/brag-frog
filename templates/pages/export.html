{% extends "base.html" %}

{% block title %}Export — Brag Frog{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Export</h1>
    <p class="page-subtitle">Download your brag document</p>
</div>

{% if phases | length == 0 %}
<div class="empty-state">
    <p>No performance cycles yet. Create one first in <a href="/goals">Performance Cycle</a>.</p>
</div>
{% else %}
<div class="export-form-container">
    <form method="get" action="/export/download" hx-boost="false" class="export-form">
        <div class="form-group">
            <label for="phase_id" class="form-label">Performance Cycle</label>
            <select name="phase_id" id="phase_id" class="form-select" required>
                {% for p in phases %}
                <option value="{{ p.id }}" {% if phase and phase.id == p.id %}selected{% endif %}>
                    {{ p.name }} ({{ p.start_date }} to {{ p.end_date }}){% if p.is_active %} — active{% endif %}
                </option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label class="form-label">Format</label>
            <div class="export-radio-group">
                <label class="export-radio-label">
                    <input type="radio" name="format" value="md" checked>
                    <span>Markdown</span>
                </label>
                <label class="export-radio-label">
                    <input type="radio" name="format" value="json">
                    <span>JSON</span>
                </label>
            </div>
        </div>

        <div class="form-group">
            <label class="export-checkbox-label">
                <input type="checkbox" name="include_goals" value="true" checked>
                <span>Include Goals & Key Results</span>
            </label>
        </div>

        <button type="submit" class="btn btn-primary">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Download
        </button>
    </form>
</div>
{% endif %}

<style>
.export-form-container {
    max-width: 480px;
}
.export-form {
    display: flex;
    flex-direction: column;
    gap: var(--space-4);
}
.export-radio-group {
    display: flex;
    gap: var(--space-4);
}
.export-radio-label {
    display: flex;
    align-items: center;
    gap: var(--space-2);
    cursor: pointer;
    font-size: var(--text-sm);
}
.export-checkbox-label {
    display: flex;
    align-items: center;
    gap: var(--space-2);
    cursor: pointer;
    font-size: var(--text-sm);
}
</style>
{% endblock %}
