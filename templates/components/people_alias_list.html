{% if people_aliases | length > 0 %}
    {% for alias in people_aliases %}
    <tr id="alias-row-{{ alias.id }}">
        <td class="alias-email">{{ alias.email }}</td>
        <td>{{ alias.display_name }}</td>
        <td>{{ alias.team | default(value="") }}</td>
        <td class="alias-actions">
            <button class="btn btn-sm btn-secondary"
                    onclick="editAlias(this, '{{ alias.id }}', '{{ alias.email }}', '{{ alias.display_name }}', '{{ alias.team | default(value='') }}')">Edit</button>
            <button class="btn btn-sm btn-danger"
                    hx-delete="/settings/people-alias/{{ alias.id }}"
                    hx-target="#people-alias-list"
                    hx-swap="innerHTML"
                    hx-confirm="Remove alias for {{ alias.email }}?">Remove</button>
        </td>
    </tr>
    {% endfor %}
{% else %}
    <tr><td colspan="4" class="text-sm text-muted" style="padding:var(--space-3) 8px">No aliases yet. Add one to map identifiers to names.</td></tr>
{% endif %}
