<div class="cycle-item-row" id="initiative-{{ initiative.id }}" style="margin-bottom: var(--space-1);">
    <div class="cycle-item-view" id="init-view-{{ initiative.id }}">
        {% if initiative.scope %}
        <span class="badge" style="background:var(--color-tint-purple);color:var(--color-purple-30);font-size:0.7rem;">{{ initiative.scope }}</span>
        {% endif %}
        <span class="cycle-item-title" style="cursor:pointer;" onclick="openPanelFromUrl('{{ initiative.title | escape }}', '/initiatives/{{ initiative.id }}/panel')">{{ initiative.title }}</span>
        <span class="badge badge-status badge-status--{{ initiative.status }}">{{ initiative.status | replace(from="_", to=" ") }}</span>
        <div class="cycle-item-right">
            <div class="cycle-item-actions">
                <button class="btn-icon btn-icon--sm" title="Edit"
                        onclick="document.getElementById('init-view-{{ initiative.id }}').classList.add('hidden'); document.getElementById('init-edit-{{ initiative.id }}').classList.remove('hidden');">
                    <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M12.146.146a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1 0 .708l-10 10a.5.5 0 0 1-.168.11l-5 2a.5.5 0 0 1-.65-.65l2-5a.5.5 0 0 1 .11-.168l10-10zM11.207 2.5L13.5 4.793 14.793 3.5 12.5 1.207 11.207 2.5zm1.586 3L10.5 3.207 4 9.707V10h.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.5h.293l6.5-6.5z"/></svg>
                </button>
                <button class="btn-icon btn-icon--danger btn-icon--sm"
                        hx-delete="/initiatives/{{ initiative.id }}"
                        hx-target="#initiative-{{ initiative.id }}"
                        hx-swap="outerHTML"
                        hx-confirm="Delete this initiative?"
                        title="Delete initiative">
                    <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0V6z"/><path fill-rule="evenodd" d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1H6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1h3.5a1 1 0 0 1 1 1v1zM4.118 4L4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4H4.118zM2.5 3V2h11v1h-11z"/></svg>
                </button>
            </div>
        </div>
    </div>
    {% if initiative.description %}
    <div class="cycle-item-desc-block">{{ initiative.description }}</div>
    {% endif %}
    <form class="cycle-item-edit hidden" id="init-edit-{{ initiative.id }}"
          hx-put="/initiatives/{{ initiative.id }}"
          hx-swap="none"
          hx-on::after-request="if(event.detail.successful) window.location.href='/goals';"
          style="flex-wrap:wrap;">
        <input type="text" name="title" class="form-input form-input--sm" value="{{ initiative.title }}" required style="flex:1;">
        <select name="status" class="form-select form-select--sm" style="width:auto;max-width:140px;">
            <option value="planned" {% if initiative.status == "planned" %}selected{% endif %}>Planned</option>
            <option value="active" {% if initiative.status == "active" %}selected{% endif %}>Active</option>
            <option value="completed" {% if initiative.status == "completed" %}selected{% endif %}>Completed</option>
            <option value="paused" {% if initiative.status == "paused" %}selected{% endif %}>Paused</option>
            <option value="cancelled" {% if initiative.status == "cancelled" %}selected{% endif %}>Cancelled</option>
        </select>
        <select name="scope" class="form-select form-select--sm" style="width:auto;max-width:120px;">
            <option value="">Scope</option>
            <option value="small" {% if initiative.scope == "small" %}selected{% endif %}>Small</option>
            <option value="medium" {% if initiative.scope == "medium" %}selected{% endif %}>Medium</option>
            <option value="large" {% if initiative.scope == "large" %}selected{% endif %}>Large</option>
            <option value="xlarge" {% if initiative.scope == "xlarge" %}selected{% endif %}>XLarge</option>
        </select>
        <div style="display:flex;align-items:center;gap:var(--space-2);width:100%;margin-top:var(--space-1);flex-wrap:wrap;">
            <label class="form-label form-label--inline" style="font-size:0.8rem;margin:0;">Description</label>
            <textarea name="description" class="form-input form-input--sm" rows="2" style="flex:1;min-width:200px;resize:vertical;">{{ initiative.description | default(value="") }}</textarea>
        </div>
        <div style="display:flex;align-items:center;gap:var(--space-3);width:100%;margin-top:var(--space-1);flex-wrap:wrap;">
            <label style="display:flex;align-items:center;gap:4px;font-size:0.8rem;cursor:pointer;">
                <input type="checkbox" name="is_planned" value="true"
                       {% if initiative.is_planned %}checked{% endif %}>
                Planned
            </label>
            <div style="display:flex;align-items:center;gap:4px;">
                <label class="form-label form-label--inline" style="font-size:0.8rem;margin:0;">Started</label>
                <input type="date" name="started_at" class="form-input form-input--sm" value="{{ initiative.started_at | default(value='') }}" style="width:auto;">
            </div>
            <div style="display:flex;align-items:center;gap:4px;">
                <label class="form-label form-label--inline" style="font-size:0.8rem;margin:0;">Completed</label>
                <input type="date" name="completed_at" class="form-input form-input--sm" value="{{ initiative.completed_at | default(value='') }}" style="width:auto;">
            </div>
        </div>
        <div style="display:flex;gap:var(--space-1);margin-top:var(--space-1);">
            <button type="submit" class="btn btn-sm btn-primary">Save</button>
            <button type="button" class="btn btn-sm btn-text"
                    onclick="document.getElementById('init-edit-{{ initiative.id }}').classList.add('hidden'); document.getElementById('init-view-{{ initiative.id }}').classList.remove('hidden');">Cancel</button>
        </div>
    </form>
</div>
