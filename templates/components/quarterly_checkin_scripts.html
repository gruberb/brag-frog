<script>
function toggleQuarterlyEdit(key) {
    var view = document.getElementById('quarterly-view-' + key);
    var editor = document.getElementById('quarterly-editor-' + key);
    var pencil = document.getElementById('quarterly-pencil-' + key);
    var close = document.getElementById('quarterly-close-' + key);

    if (editor.style.display === 'none') {
        view.style.display = 'none';
        editor.style.display = 'block';
        pencil.style.display = 'none';
        close.style.display = 'block';
        document.getElementById('quarterly-textarea-' + key).focus();
    } else {
        cancelQuarterlyEdit(key);
    }
}

function cancelQuarterlyEdit(key) {
    var view = document.getElementById('quarterly-view-' + key);
    var editor = document.getElementById('quarterly-editor-' + key);
    var pencil = document.getElementById('quarterly-pencil-' + key);
    var close = document.getElementById('quarterly-close-' + key);
    var textarea = document.getElementById('quarterly-textarea-' + key);

    if (textarea) textarea.value = textarea.defaultValue;

    editor.style.display = 'none';
    view.style.display = 'block';
    pencil.style.display = 'block';
    close.style.display = 'none';

    var status = document.getElementById('quarterly-save-status-' + key);
    if (status) status.innerHTML = '';
}

function saveQuarterlySection(key, quarter, year) {
    var textarea = document.getElementById('quarterly-textarea-' + key);
    var status = document.getElementById('quarterly-save-status-' + key);
    if (!textarea || !status) return;

    status.innerHTML = '<span style="color:var(--color-text-secondary);">Saving...</span>';

    var formData = new URLSearchParams();
    formData.append('content', textarea.value);

    fetch('/quarterly-checkin/' + encodeURIComponent(quarter) + '/' + encodeURIComponent(year) + '/save/' + encodeURIComponent(key), {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded', 'HX-Request': 'true' },
        body: formData.toString()
    })
    .then(function(response) {
        if (!response.ok) throw new Error('Save failed');
        return response.text();
    })
    .then(function(html) {
        var section = document.getElementById('quarterly-section-' + key);
        section.outerHTML = html;
    })
    .catch(function() {
        status.innerHTML = '<span style="color:var(--color-error);">Save failed. Try again.</span>';
    });
}

function copyQuarterlySection(key) {
    var textEl = document.getElementById('quarterly-text-' + key);
    if (!textEl) return;
    var text = textEl.innerText.trim();
    if (!text) return;
    navigator.clipboard.writeText(text).then(function() {
        var status = document.getElementById('quarterly-copy-status-' + key);
        if (status) {
            status.style.display = 'inline';
            setTimeout(function() { status.style.display = 'none'; }, 1500);
        }
    });
}

function fetchQuarterlyAiDraft(key, quarter, year) {
    var textarea = document.getElementById('quarterly-textarea-' + key);
    var btn = document.getElementById('quarterly-ai-btn-' + key);
    var loading = document.getElementById('quarterly-ai-loading-' + key);
    if (!textarea || !btn) return;

    btn.disabled = true;
    if (loading) loading.style.display = 'block';

    fetch('/quarterly-checkin/' + encodeURIComponent(quarter) + '/' + encodeURIComponent(year) + '/ai-draft/' + encodeURIComponent(key), {
        method: 'POST',
        headers: { 'HX-Request': 'true' }
    })
    .then(function(response) {
        if (!response.ok) throw new Error('AI generation failed');
        return response.text();
    })
    .then(function(text) {
        textarea.value = text;
        textarea.focus();
    })
    .catch(function() {
        var status = document.getElementById('quarterly-save-status-' + key);
        if (status) status.innerHTML = '<span style="color:var(--color-error);">AI draft failed. Try again.</span>';
    })
    .finally(function() {
        btn.disabled = false;
        if (loading) loading.style.display = 'none';
    });
}
</script>
