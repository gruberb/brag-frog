{% if source_counts | length > 0 %}
<div class="card">
    <h2 style="margin:0 0 var(--space-3) 0;">Synced Entries</h2>
    <div class="stat-chips">
        {% for sc in source_counts %}
        <a href="/logbook?source={{ sc.0 }}" class="stat-chip" style="text-decoration:none;color:inherit;">
            <span class="stat-chip-label">{{ sc.0 | source_label }}</span>
            <span class="stat-chip-count">{{ sc.1 }}</span>
        </a>
        {% endfor %}
    </div>
</div>
{% endif %}
