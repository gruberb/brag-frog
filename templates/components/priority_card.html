<div id="priority-{{ priority.id }}" style="margin-bottom:12px;">
    <div id="priority-view-{{ priority.id }}">
        <div style="display:flex;align-items:center;gap:8px;">
            {% if priority.color %}
            <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:{{ priority.color }};flex-shrink:0;"></span>
            {% endif %}
            <span style="font-weight:600;">{{ priority.title }}</span>
            <span class="badge badge-status badge-status--{{ priority.status }}">{{ priority.status | replace(from="_", to=" ") }}</span>
            {% if priority.scope %}
            <span class="badge" style="font-size:0.7rem;background:var(--color-tint-purple);color:var(--color-purple-30);">{{ priority.scope }}</span>
            {% endif %}
            <div style="margin-left:auto;display:flex;gap:2px;">
                <button class="btn-icon btn-icon--sm" title="Edit"
                        onclick="document.getElementById('priority-view-{{ priority.id }}').classList.add('hidden'); document.getElementById('priority-edit-{{ priority.id }}').classList.remove('hidden');">
                    <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M12.146.146a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1 0 .708l-10 10a.5.5 0 0 1-.168.11l-5 2a.5.5 0 0 1-.65-.65l2-5a.5.5 0 0 1 .11-.168l10-10zM11.207 2.5L13.5 4.793 14.793 3.5 12.5 1.207 11.207 2.5zm1.586 3L10.5 3.207 4 9.707V10h.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.5h.293l6.5-6.5z"/></svg>
                </button>
                <button class="btn-icon btn-icon--danger btn-icon--sm"
                        hx-delete="/priorities/{{ priority.id }}"
                        hx-target="#priority-{{ priority.id }}"
                        hx-swap="outerHTML"
                        hx-confirm="Delete this priority?"
                        title="Delete priority">
                    <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0V6z"/><path fill-rule="evenodd" d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1H6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1h3.5a1 1 0 0 1 1 1v1zM4.118 4L4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4H4.118zM2.5 3V2h11v1h-11z"/></svg>
                </button>
            </div>
        </div>
        {% if priority.description %}
        <p class="text-sm" style="margin-top:4px;color:var(--color-text-secondary);">{{ priority.description }}</p>
        {% endif %}
    </div>
    <form class="hidden" id="priority-edit-{{ priority.id }}"
          hx-put="/priorities/{{ priority.id }}"
          hx-target="#priority-{{ priority.id }}"
          hx-swap="outerHTML"
          style="padding:12px;border:1px solid var(--color-border);border-radius:var(--radius);margin-top:4px;">
        <div class="form-group">
            <label class="form-label">Title</label>
            <input type="text" name="title" class="form-input" value="{{ priority.title }}" required>
        </div>
        <div style="display:flex;gap:var(--space-2);flex-wrap:wrap;">
            <div class="form-group" style="flex:1;min-width:140px;">
                <label class="form-label">Status</label>
                <select name="status" class="form-select">
                    <option value="not_started" {% if priority.status == "not_started" %}selected{% endif %}>Not Started</option>
                    <option value="active" {% if priority.status == "active" %}selected{% endif %}>Active</option>
                    <option value="on_hold" {% if priority.status == "on_hold" %}selected{% endif %}>On Hold</option>
                    <option value="completed" {% if priority.status == "completed" %}selected{% endif %}>Completed</option>
                    <option value="cancelled" {% if priority.status == "cancelled" %}selected{% endif %}>Cancelled</option>
                </select>
            </div>
            <div class="form-group" style="flex:1;min-width:120px;">
                <label class="form-label">Scope</label>
                <select name="scope" class="form-select">
                    <option value="">None</option>
                    <option value="small" {% if priority.scope == "small" %}selected{% endif %}>Small</option>
                    <option value="medium" {% if priority.scope == "medium" %}selected{% endif %}>Medium</option>
                    <option value="large" {% if priority.scope == "large" %}selected{% endif %}>Large</option>
                    <option value="xlarge" {% if priority.scope == "xlarge" %}selected{% endif %}>XLarge</option>
                </select>
            </div>
        </div>
        <input type="hidden" name="department_goal_id" value="{{ priority.department_goal_id | default(value='') }}">
        <div class="form-group">
            <label class="form-label">Description</label>
            <textarea name="description" class="form-textarea" rows="2">{{ priority.description | default(value="") }}</textarea>
        </div>
        <div class="form-group">
            <label class="form-label">Impact Narrative</label>
            <textarea name="impact_narrative" class="form-textarea" rows="2">{{ priority.impact_narrative | default(value="") }}</textarea>
        </div>
        <div style="display:flex;gap:var(--space-2);flex-wrap:wrap;">
            <div class="form-group" style="flex:1;min-width:140px;">
                <label class="form-label">Started At</label>
                <input type="date" name="started_at" class="form-input" value="{{ priority.started_at | default(value='') }}">
            </div>
            <div class="form-group" style="flex:1;min-width:140px;">
                <label class="form-label">Completed At</label>
                <input type="date" name="completed_at" class="form-input" value="{{ priority.completed_at | default(value='') }}">
            </div>
        </div>
        <div style="display:flex;gap:var(--space-1);margin-top:var(--space-1);">
            <button type="submit" class="btn btn-sm btn-primary">Save</button>
            <button type="button" class="btn btn-sm btn-text"
                    onclick="document.getElementById('priority-edit-{{ priority.id }}').classList.add('hidden'); document.getElementById('priority-view-{{ priority.id }}').classList.remove('hidden');">Cancel</button>
        </div>
    </form>
</div>
