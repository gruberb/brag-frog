<div class="cycle-item-row" id="dept-goal-{{ goal.id }}">
    <div class="cycle-item-view" id="dept-goal-view-{{ goal.id }}">
        <span class="cycle-item-title">{{ goal.title }}</span>
        {% if goal.status %}
        <span class="badge badge-status badge-status--{{ goal.status }}">{{ goal.status | replace(from="_", to=" ") }}</span>
        {% endif %}
        {% if goal.source %}
        <span class="badge" style="font-size:0.65rem;opacity:0.7;">{{ goal.source }}</span>
        {% endif %}
        <div style="margin-left:auto;display:flex;gap:2px;">
            <button class="btn-icon btn-icon--sm" title="Edit"
                    onclick="document.getElementById('dept-goal-view-{{ goal.id }}').classList.add('hidden'); document.getElementById('dept-goal-edit-{{ goal.id }}').classList.remove('hidden');">
                <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M12.146.146a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1 0 .708l-10 10a.5.5 0 0 1-.168.11l-5 2a.5.5 0 0 1-.65-.65l2-5a.5.5 0 0 1 .11-.168l10-10zM11.207 2.5L13.5 4.793 14.793 3.5 12.5 1.207 11.207 2.5zm1.586 3L10.5 3.207 4 9.707V10h.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.5h.293l6.5-6.5z"/></svg>
            </button>
            <button class="btn-icon btn-icon--danger btn-icon--sm"
                    hx-delete="/priorities/goals/{{ goal.id }}"
                    hx-target="#dept-goal-{{ goal.id }}"
                    hx-swap="outerHTML"
                    hx-confirm="Delete this department goal?"
                    title="Delete department goal">
                <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0V6z"/><path fill-rule="evenodd" d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1H6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1h3.5a1 1 0 0 1 1 1v1zM4.118 4L4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4H4.118zM2.5 3V2h11v1h-11z"/></svg>
            </button>
        </div>
    </div>
    {% if goal.description %}
    <div class="cycle-item-desc-block">{{ goal.description }}</div>
    {% endif %}
    <form class="cycle-item-edit{% if not show_edit_form %} hidden{% endif %}" id="dept-goal-edit-{{ goal.id }}"
          hx-put="/priorities/goals/{{ goal.id }}"
          hx-target="#dept-goal-{{ goal.id }}"
          hx-swap="outerHTML"
          style="flex-wrap:wrap;">
        <input type="text" name="title" class="form-input form-input--sm" value="{{ goal.title }}" required style="flex:1;">
        <select name="status" class="form-select form-select--sm" style="width:auto;max-width:160px;">
            <option value="not_started" {% if goal.status == "not_started" %}selected{% endif %}>Not Started</option>
            <option value="in_progress" {% if goal.status == "in_progress" %}selected{% endif %}>In Progress</option>
            <option value="on_hold" {% if goal.status == "on_hold" %}selected{% endif %}>On Hold</option>
            <option value="completed" {% if goal.status == "completed" %}selected{% endif %}>Completed</option>
        </select>
        <div style="display:flex;align-items:center;gap:var(--space-2);width:100%;margin-top:var(--space-1);">
            <textarea name="description" class="form-input form-input--sm" rows="2" placeholder="Description" style="flex:1;resize:vertical;">{{ goal.description | default(value="") }}</textarea>
        </div>
        <div style="display:flex;gap:var(--space-1);margin-top:var(--space-1);">
            <button type="submit" class="btn btn-sm btn-primary">Save</button>
            <button type="button" class="btn btn-sm btn-text"
                    onclick="document.getElementById('dept-goal-edit-{{ goal.id }}').classList.add('hidden'); document.getElementById('dept-goal-view-{{ goal.id }}').classList.remove('hidden');">Cancel</button>
        </div>
    </form>
</div>
