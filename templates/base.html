<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>{% block title %}Brag Frog{% endblock %}</title>
        <link rel="icon" type="image/svg+xml" href="/static/img/favicon.svg" />
        <link
            rel="icon"
            type="image/png"
            sizes="32x32"
            href="/static/img/favicon.png"
        />
        <link rel="apple-touch-icon" href="/static/img/favicon.png" />
        <link rel="stylesheet" href="/static/css/tokens.css" />
        <link rel="stylesheet" href="/custom/tokens.css" />
        <link rel="stylesheet" href="/static/css/main.css" />
        <link rel="stylesheet" href="/static/css/components/spinner.css" />
        <link rel="stylesheet" href="/static/css/components/badges.css" />
        <link rel="stylesheet" href="/static/css/components/entries.css" />
        <link rel="stylesheet" href="/static/css/components/goals.css" />
        <link rel="stylesheet" href="/static/css/components/goals-okr.css" />
        <link rel="stylesheet" href="/static/css/components/logbook.css" />
        <link rel="stylesheet" href="/static/css/components/analyze.css" />
        <link rel="stylesheet" href="/static/css/components/summary.css" />
        <link rel="stylesheet" href="/static/css/components/settings.css" />
        <link rel="stylesheet" href="/static/css/components/dashboard.css" />
        <link rel="stylesheet" href="/static/css/components/panels.css" />
        <link rel="stylesheet" href="/static/css/components/pixel-fx.css" />
        <link
            rel="stylesheet"
            href="/static/css/components/command-palette.css"
        />
        <script src="/static/js/htmx.min.js"></script>
    </head>
    <body hx-boost="true">
        <header class="site-header">
            <div class="header-inner">
                <a href="/" class="logo">
                    <img
                        src="/static/img/symbol.svg"
                        alt=""
                        class="logo-icon"
                    />
                    Brag Frog
                </a>
                <button
                    class="hamburger"
                    aria-label="Toggle navigation"
                    onclick="
                        document
                            .querySelector('.site-header')
                            .classList.toggle('nav-open')
                    "
                >
                    <span></span><span></span><span></span>
                </button>
                <nav class="main-nav">
                    <a
                        href="/dashboard"
                        class="{% if current_page == 'dashboard' %}active{% endif %}"
                        >Dashboard</a
                    >
                    <a
                        href="/logbook"
                        class="{% if current_page == 'logbook' %}active{% endif %}"
                        >Logbook</a
                    >
                    <a
                        href="/goals"
                        class="{% if current_page == 'goals' %}active{% endif %}"
                        >Goals</a
                    >
                    {% if phase %}
                    <a
                        href="/review/{{ phase.id }}"
                        class="{% if current_page == 'review' or current_page == 'summary' %}active{% endif %}"
                        >Review</a
                    >
                    {% else %}
                    <span class="disabled">Review</span>
                    {% endif %}
                </nav>
                <div class="header-right">
                    <kbd
                        class="cmd-k-badge"
                        title="Command Palette"
                        onclick="openCommandPalette()"
                        >⌘K</kbd
                    >
                    {% if user %}
                    <div class="user-dropdown" id="user-dropdown">
                        <button
                            class="user-dropdown-trigger"
                            onclick="toggleUserDropdown()"
                            type="button"
                        >
                            {% if user.avatar_url %}
                            <img
                                src="{{ user.avatar_url }}"
                                alt="{{ user.name }}"
                                class="avatar"
                                referrerpolicy="no-referrer"
                            />
                            {% endif %}
                            <span class="user-name"
                                >{{ user.name | split(pat=" ") | first }}</span
                            >
                            <svg
                                width="12"
                                height="12"
                                viewBox="0 0 16 16"
                                fill="currentColor"
                                class="dropdown-chevron"
                            >
                                <path
                                    d="M4.427 7.427l3.396 3.396a.25.25 0 00.354 0l3.396-3.396A.25.25 0 0011.396 7H4.604a.25.25 0 00-.177.427z"
                                />
                            </svg>
                        </button>
                        <div class="user-dropdown-menu" id="user-dropdown-menu">
                            <a href="/settings" class="user-dropdown-item">
                                <svg
                                    width="16"
                                    height="16"
                                    viewBox="0 0 24 24"
                                    fill="none"
                                    stroke="currentColor"
                                    stroke-width="2"
                                    stroke-linecap="round"
                                    stroke-linejoin="round"
                                >
                                    <circle cx="12" cy="12" r="3" />
                                    <path
                                        d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"
                                    />
                                </svg>
                                Settings
                            </a>
                            <a href="/integrations" class="user-dropdown-item">
                                <svg
                                    width="16"
                                    height="16"
                                    viewBox="0 0 24 24"
                                    fill="none"
                                    stroke="currentColor"
                                    stroke-width="2"
                                    stroke-linecap="round"
                                    stroke-linejoin="round"
                                >
                                    <path
                                        d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"
                                    />
                                    <polyline points="15 3 21 3 21 9" />
                                    <line x1="10" y1="14" x2="21" y2="3" />
                                </svg>
                                Integrations
                            </a>
                            <a href="/level-guide" class="user-dropdown-item">
                                <svg
                                    width="16"
                                    height="16"
                                    viewBox="0 0 24 24"
                                    fill="none"
                                    stroke="currentColor"
                                    stroke-width="2"
                                    stroke-linecap="round"
                                    stroke-linejoin="round"
                                >
                                    <path
                                        d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"
                                    />
                                    <path
                                        d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"
                                    />
                                </svg>
                                Level Guide
                            </a>
                            <a href="/trends" class="user-dropdown-item">
                                <svg
                                    width="16"
                                    height="16"
                                    viewBox="0 0 24 24"
                                    fill="none"
                                    stroke="currentColor"
                                    stroke-width="2"
                                    stroke-linecap="round"
                                    stroke-linejoin="round"
                                >
                                    <polyline
                                        points="22 12 18 12 15 21 9 3 6 12 2 12"
                                    />
                                </svg>
                                Trends
                            </a>
                            <a href="/export" class="user-dropdown-item">
                                <svg
                                    width="16"
                                    height="16"
                                    viewBox="0 0 24 24"
                                    fill="none"
                                    stroke="currentColor"
                                    stroke-width="2"
                                    stroke-linecap="round"
                                    stroke-linejoin="round"
                                >
                                    <path
                                        d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"
                                    />
                                    <polyline points="7 10 12 15 17 10" />
                                    <line x1="12" y1="15" x2="12" y2="3" />
                                </svg>
                                Export
                            </a>
                            <button
                                type="button"
                                class="user-dropdown-item"
                                id="nav-sync-btn"
                                hx-post="/sync/all"
                                hx-swap="none"
                                hx-disabled-elt="this"
                                hx-on::before-request="this.querySelector('.sync-label').textContent='Syncing...'"
                                hx-on::after-request="this.querySelector('.sync-label').textContent='Sync All'; window.location.reload();"
                                style="
                                    width: 100%;
                                    text-align: left;
                                    background: none;
                                    border: none;
                                    cursor: pointer;
                                    color: inherit;
                                "
                            >
                                <svg
                                    width="16"
                                    height="16"
                                    viewBox="0 0 24 24"
                                    fill="none"
                                    stroke="currentColor"
                                    stroke-width="2"
                                    stroke-linecap="round"
                                    stroke-linejoin="round"
                                >
                                    <polyline points="23 4 23 10 17 10" />
                                    <polyline points="1 20 1 14 7 14" />
                                    <path
                                        d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"
                                    />
                                </svg>
                                <span class="sync-label">Sync All</span>
                            </button>
                            <div class="user-dropdown-divider"></div>
                            <form
                                method="post"
                                action="/auth/logout"
                                hx-boost="false"
                                class="user-dropdown-item user-dropdown-item--logout"
                            >
                                <button
                                    type="submit"
                                    class="user-dropdown-logout-btn"
                                >
                                    <svg
                                        width="16"
                                        height="16"
                                        viewBox="0 0 24 24"
                                        fill="none"
                                        stroke="currentColor"
                                        stroke-width="2"
                                        stroke-linecap="round"
                                        stroke-linejoin="round"
                                    >
                                        <path
                                            d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"
                                        />
                                        <polyline points="16 17 21 12 16 7" />
                                        <line x1="21" y1="12" x2="9" y2="12" />
                                    </svg>
                                    Sign Out
                                </button>
                            </form>
                        </div>
                    </div>
                    {% endif %}
                </div>
            </div>
        </header>

        <main class="content">{% block content %}{% endblock %}</main>

        <footer class="site-footer">
            <div class="footer-inner">
                <a href="/" class="footer-brand">
                    <img
                        src="/static/img/symbol.svg"
                        alt=""
                        class="footer-logo"
                    />
                    <span>Brag Frog</span>
                </a>
                <nav class="footer-nav">
                    <a
                        href="https://github.com/gruberb/brag-frog"
                        target="_blank"
                        rel="noopener"
                        >GitHub</a
                    >
                </nav>
            </div>
        </footer>

        {% block overlay %}{% endblock %} {% include
        "components/command_palette.html" %}

        <!-- Panel system -->
        <div class="panel-scrim" id="panel-scrim" onclick="closePanel()"></div>
        <div class="panel-container" id="panel-container">
            <div class="panel-header">
                <h2 id="panel-title"></h2>
                <button
                    class="panel-close"
                    onclick="closePanel()"
                    aria-label="Close panel"
                >
                    <svg
                        width="20"
                        height="20"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                    >
                        <line x1="18" y1="6" x2="6" y2="18" />
                        <line x1="6" y1="6" x2="18" y2="18" />
                    </svg>
                </button>
            </div>
            <div class="panel-body" id="panel-body"></div>
        </div>

        <script src="/static/js/dropdown.js"></script>
        <script src="/static/js/panel.js"></script>
        <script src="/static/js/command-palette.js"></script>
        <script src="/static/js/flash.js"></script>
        <script src="/static/js/entries.js"></script>
        <script src="/static/js/dashboard.js"></script>
        <script src="/static/js/app.js"></script>
    </body>
</html>
