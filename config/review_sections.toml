# Review section configuration for self-assessment generation.
# Aligned with Lattice's performance review format.
# Override via custom/review_sections.toml for other platforms.

review_platform = "Lattice"

[[sections]]
slug = "impact_examples"
title = "Contribution & Impact Examples"
question = "Describe 1-2 examples of your work so far this year that illustrate your level of contribution and impact."
form_question_number = "1"
form_required = true
form_question = "Describe 1-2 examples of your work so far this year that illustrate your level of contribution and impact."
form_guidance = "For each example, summarize:"
form_bullets = [
    "The outcome or progress made (or impact still in progress)",
    "The CLG behaviors needed for success and how they were demonstrated",
    "What you learned that you'll carry forward, and what will you do next to continue your development",
]
form_tip = "Use concise, evidence-based examples to describe what changed, who was impacted, and how you approached the work."
form_placeholder = "Required: Write your response..."
focus_priorities = true
focus_priority_help = "Select department goals you want this Lattice answer to emphasize. Brag Frog will still use linked contribution examples, priorities, and logbook evidence."
prompt = """Write one paste-ready answer for this Lattice self-review question:
"Describe 1-2 examples of your work so far this year that illustrate your level of contribution and impact."

Match a strong structured self-reflection format: action-oriented headline, status, impact bullets, details bullets, CLG behavior bullets, and learnings bullets. Use compact Markdown that can be pasted into one Lattice textbox.

Use exactly this structure:

1. <Action-oriented example headline>

Status: <Completed/In progress/etc. plus one concrete sentence about what shipped, changed, or is ready.>

Impact:
- <3-5 bullets focused on team, user, organization, reliability, launch, or operational impact.>
- <Use only the strongest ticket IDs as supporting evidence, not as the structure.>

Details:
- <3-5 bullets with ownership, scope, technical complexity, sequencing, collaborators, and cross-team coordination.>

CLG Behaviors Demonstrated:
- Complexity: <Concrete action and why it was ambiguous or broad.>
- Risk Management: <Concrete sequencing, observability, rollout, or mitigation.>
- Influence & Communication: <Concrete stakeholder/team alignment.>
- Team Contribution or Domain Expertise: <Concrete support, review, mentoring, or technical leadership.>

Learnings Going Forward:
- <1-2 bullets about what I learned and how I will apply it next.>

2. <Second action-oriented example headline>

Repeat the same Status, Impact, Details, CLG Behaviors Demonstrated, and Learnings Going Forward structure.

3. Development Focus For H2 / Next Half

- <4-6 bullets about what I want to continue developing in the next quarter/half. Tie these to the work above, team success, and future Staff-level impact.>

Output rules:
- Do not include an H1/H2 title before section 1.
- Write in first person with a direct self-review style: concrete, evidence-dense, confident, and outcome-oriented.
- Use two examples when the evidence supports two strong examples; use one example only if the second would be weak. Always include section 3.
- Prefer selected department goals and contribution examples first, then linked priorities and logbook entries.
- Favor impact and stakeholder value over long ticket lists. Link only the most important Jira IDs. If a Jira URL appears in the evidence for a cited issue, format the issue key as a Markdown link.
- Name teams, stakeholders, and collaborators when the evidence provides them.
- Do not undercut impact with phrases like "has not fully shipped yet"; if work is still in progress, frame the concrete progress, risk reduction, launch readiness, or remaining rollout work.
- Do not invent metrics. If quantitative evidence is absent, use concrete qualitative outcomes.
- Avoid vague phrases such as "demonstrated domain expertise" unless tied to a concrete action."""
