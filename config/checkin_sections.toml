# Review check-in section configuration.
# Override via custom/checkin_sections.toml.

[[sections]]
slug = "highlights_impact"
title = "Ownership & Impact"
quarterly_title = "Impact & Outcomes"
quarterly_question = "What did you own end-to-end this quarter? Which outcomes had the greatest impact on team or organizational goals, and what did your ownership look like in practice? Which CLG behaviors or skills supported that impact?"
ai_prompt = """Draft a quarterly check-in answer from logged work. Focus on:
- Concrete outcomes owned end-to-end and their impact on team or organizational goals
- Evidence of proactive ownership, dependency resolution, and stakeholder communication
- CLG behaviors or skills that supported the impact
Use first person. Be specific and evidence-based."""

[[sections]]
slug = "learnings_adjustments"
title = "Blockers & Tradeoffs"
quarterly_title = "Lessons & Adjustments"
quarterly_question = "What were the biggest blockers or tradeoffs you navigated this quarter? How did you communicate constraints and options to stakeholders? What have you learned from feedback, results, or experiences?"
ai_prompt = """Draft a quarterly check-in answer from logged work. Focus on:
- Patterns in how the user communicated constraints and options
- Evidence of framing delays as tradeoffs rather than surprises
- Concrete adjustments made in response to feedback, results, or experiences
Use first person. Be reflective about communication growth."""

[[sections]]
slug = "growth_development"
title = "Relationships & Curiosity"
quarterly_title = "Growth & Relationships"
quarterly_question = "What cross-team relationships did you build or strengthen this quarter? What did you learn by engaging with people outside your immediate team? What experiences, projects, or responsibilities stretched your growth?"
ai_prompt = """Draft a quarterly check-in answer from logged work. Focus on:
- Cross-team relationships built or strengthened
- Insights gained from collaborators outside the immediate team
- Experiences, projects, or responsibilities that stretched growth
Use first person. Highlight the value of cross-functional engagement."""

[[sections]]
slug = "support_feedback"
title = "Giving & Helping"
quarterly_title = "Contributions & Collaboration"
quarterly_question = "How did you help others this quarter? What professional relationships did you invest in, and how did that give-and-take shape your effectiveness? Are there ways we could improve how we collaborate?"
ai_prompt = """Draft a quarterly check-in answer from logged work. Focus on:
- Patterns of helping others (unblocking, mentoring, reviewing, collaborating)
- Give-and-take dynamics in professional relationships
- How investing in others amplified the user's own effectiveness
- Collaboration or communication improvements worth raising
Use first person. Be specific about contributions to others."""

[[sections]]
slug = "looking_ahead"
title = "Looking Ahead"
quarterly_title = "Looking Ahead"
quarterly_question = "What are your top priorities for next quarter? What do stakeholders need to know about your focus and any upcoming tradeoffs? Where would alignment with your manager or team be most valuable?"
ai_prompt = """Draft a quarterly check-in answer from logged work. Focus on:
- Key priorities and why they matter to the team and organization
- Stakeholder communication needs and upcoming tradeoffs
- Areas where manager or team alignment would help
Use first person. Be energized and strategic."""
